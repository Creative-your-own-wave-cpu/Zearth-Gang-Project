<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EARTH GANG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#4285F4;
  --red:#FF3B30;
  --bg:#000;
  --card:rgba(22,22,28,0.97);
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.11);
  --text:#fff;
  --muted:rgba(255,255,255,0.48);
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,34px);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'DM Sans',sans-serif;color:#fff;}

/* ══ GLOBE SCREEN ══ */
#screen-globe{position:fixed;inset:0;z-index:10;}
#globe-canvas-wrap{position:absolute;inset:0;}

/* Top bar */
#globe-topbar{
  position:absolute;top:0;left:0;right:0;z-index:50;
  padding:calc(var(--st) + 10px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,transparent 100%);
  pointer-events:none;
}
#app-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.14em;text-shadow:0 2px 16px rgba(0,0,0,0.7);}
#menu-btn{
  width:42px;height:42px;border-radius:13px;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(14px);
  border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;pointer-events:all;
}
.bar{width:18px;height:2px;background:#fff;border-radius:1px;}

/* Bottom controls */
#globe-bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:50;
  padding:0 24px calc(var(--sb) + 24px);
  display:flex;align-items:flex-end;justify-content:space-between;
}
#zoom-to-map-btn{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(14px);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:1.3rem;
}
#save-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
#save-btn{
  width:76px;height:76px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 0 rgba(66,133,244,0.5),0 10px 32px rgba(66,133,244,0.38);
  animation:pulse 2.6s ease-in-out infinite;
  transition:transform 0.13s;
}
#save-btn:active{transform:scale(0.88);animation:none;}
#save-btn svg{width:32px;height:32px;fill:#fff;}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(66,133,244,0.5),0 10px 32px rgba(66,133,244,0.38);}
  50%{box-shadow:0 0 0 14px rgba(66,133,244,0),0 10px 32px rgba(66,133,244,0.38);}
}
#save-label{font-size:0.66rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
#myloc-btn{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(14px);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
#myloc-btn svg{width:22px;height:22px;}

/* ══ MAP SCREEN ══ */
#screen-map{
  position:fixed;inset:0;z-index:20;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
#screen-map.open{transform:translateY(0);}
#map-el{width:100%;height:100%;}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important;}
#map-topbar{
  position:absolute;top:0;left:0;right:0;z-index:500;
  padding:calc(var(--st) + 8px) 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.65) 0%,transparent 100%);
  display:flex;align-items:center;gap:12px;
  pointer-events:none;
}
#map-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:1.1rem;
  pointer-events:all;
}
#map-file-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.09em;text-shadow:0 1px 8px rgba(0,0,0,0.8);flex:1;}
#map-bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:500;
  padding:0 20px calc(var(--sb) + 20px);
  display:flex;align-items:flex-end;justify-content:space-between;
  pointer-events:none;
}
.map-btn{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;pointer-events:all;
}
#map-save-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:all;}
#map-save-btn{
  width:72px;height:72px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 0 rgba(66,133,244,0.5),0 8px 28px rgba(66,133,244,0.38);
  animation:pulse 2.6s ease-in-out infinite;
  transition:transform 0.13s;
}
#map-save-btn:active{transform:scale(0.88);animation:none;}
#map-save-btn svg{width:28px;height:28px;fill:#fff;}
#map-save-label{font-size:0.64rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.55);}

/* ══ SIDE MENU ══ */
#menu-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.45);opacity:0;pointer-events:none;transition:opacity 0.3s;}
#menu-overlay.show{opacity:1;pointer-events:all;}
#side-menu{
  position:fixed;top:0;left:0;bottom:0;width:min(300px,80vw);
  background:var(--card);backdrop-filter:blur(28px);
  border-right:1px solid var(--border);z-index:90;
  transform:translateX(-100%);transition:transform 0.36s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
#side-menu.open{transform:translateX(0);}
#menu-header{padding:calc(var(--st) + 16px) 20px 14px;border-bottom:1px solid var(--border);}
#menu-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.1em;}
#menu-header p{font-size:0.75rem;color:var(--muted);margin-top:3px;}
#files-list-menu{flex:1;overflow-y:auto;padding:10px 0;}
#files-list-menu::-webkit-scrollbar{display:none;}
.menu-file{
  display:flex;align-items:center;gap:12px;
  padding:13px 20px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.15s;
}
.menu-file:active{background:var(--glass);}
.menu-file-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.menu-file-info{flex:1;min-width:0;}
.menu-file-name{font-weight:500;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.menu-file-count{font-size:0.72rem;color:var(--muted);margin-top:1px;}
.menu-file-del{padding:6px 10px;color:var(--red);font-size:0.78rem;font-weight:600;background:none;border:none;cursor:pointer;flex-shrink:0;}
#add-file-btn{
  margin:14px 16px calc(var(--sb) + 14px);
  padding:14px;background:var(--accent);color:#fff;border:none;border-radius:13px;
  font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;
  transition:opacity 0.15s;
}
#add-file-btn:active{opacity:0.8;}

/* ══ PLACES DRAWER ══ */
#places-overlay{position:fixed;inset:0;z-index:180;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.3s;}
#places-overlay.show{opacity:1;pointer-events:all;}
#places-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(310px,82vw);
  background:var(--card);backdrop-filter:blur(28px);
  border-left:1px solid var(--border);z-index:190;
  transform:translateX(100%);transition:transform 0.36s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
#places-drawer.open{transform:translateX(0);}
#drawer-hdr{padding:calc(var(--st) + 12px) 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
#drawer-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.08em;}
#close-drawer-btn{width:28px;height:28px;background:var(--glass);border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;}
#drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#drawer-list::-webkit-scrollbar{display:none;}
.place-item{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s;position:relative;}
.place-item:active{background:var(--glass);}
.place-name{font-weight:500;font-size:0.88rem;padding-right:28px;}
.place-date{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.place-del{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--red);font-size:0.78rem;cursor:pointer;padding:4px 8px;}
.drawer-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.65;}

/* ══ SAVE SHEET ══ */
#save-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(14,14,20,0.98);backdrop-filter:blur(28px);
  border-top:1px solid var(--border);border-radius:22px 22px 0 0;
  padding:0 20px calc(var(--sb) + 22px);
  transform:translateY(100%);transition:transform 0.36s cubic-bezier(0.4,0,0.2,1);
}
#save-sheet.open{transform:translateY(0);}
.s-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:13px auto 20px;}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:0.07em;margin-bottom:13px;}
#place-input{
  width:100%;background:rgba(44,44,48,1);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:1rem;color:#fff;
  outline:none;margin-bottom:12px;transition:border-color 0.2s;
}
#place-input::placeholder{color:var(--muted);}
#place-input:focus{border-color:rgba(66,133,244,0.6);}
.s-btns{display:flex;gap:10px;}
#confirm-btn{flex:1;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;}
#confirm-btn:active{opacity:0.8;}
#cancel-btn{padding:15px 20px;background:rgba(44,44,48,1);border:1px solid var(--border);color:var(--muted);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;cursor:pointer;}

/* ══ FILE PICKER (no files open) ══ */
#file-picker{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(14,14,20,0.98);backdrop-filter:blur(28px);
  border-top:1px solid var(--border);border-radius:22px 22px 0 0;
  padding:0 20px calc(var(--sb) + 22px);
  transform:translateY(100%);transition:transform 0.36s cubic-bezier(0.4,0,0.2,1);
}
#file-picker.open{transform:translateY(0);}
#fp-list{max-height:45vh;overflow-y:auto;margin-bottom:12px;}
.fp-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s;}
.fp-item:active{background:var(--glass);}
.fp-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.fp-name{font-weight:500;font-size:0.9rem;}

/* ══ TOAST ══ */
#toast{
  position:fixed;top:calc(var(--st) + 55px);left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:rgba(24,24,30,0.96);border:1px solid var(--border);
  color:#fff;padding:9px 20px;border-radius:20px;font-size:0.81rem;font-weight:500;
  white-space:nowrap;z-index:400;opacity:0;transition:opacity 0.22s,transform 0.22s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loc dot */
.loc-dot{width:14px;height:14px;background:#4285F4;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 4px rgba(66,133,244,0.22);}

/* Emoji floaters */
.floater{position:absolute;pointer-events:none;font-size:1.4rem;opacity:0;animation:floatUp 4s ease-in-out forwards;z-index:30;}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(0.5);}
  15%{opacity:1;transform:translateY(-10px) scale(1);}
  80%{opacity:0.8;}
  100%{opacity:0;transform:translateY(-80px) scale(0.8);}
}
</style>
</head>

<div id="screen-map">

<!-- ══ SIDE MENU ══ -->
<div id="menu-overlay"></div>

<!-- ══ PLACES DRAWER ══ -->
<div id="places-overlay"></div>

</div>

<div id="toast"></div>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.150.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.150.1/examples/jsm/"}}</script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── STATE ──
let files = JSON.parse(localStorage.getItem('eg_files')||'[]');
let currentFileId = null;
let userLat = null, userLng = null;
let map, mapDot, mapAcc, watchId = null;
let pendingLat, pendingLng, pendingScreen = 'globe';

// ── THREE.JS GLOBE ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
camera.position.z = 2.6;
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('globe-canvas-wrap').appendChild(renderer.domElement);

// Stars
const sg = new THREE.BufferGeometry();
const sp = new Float32Array(2000*3);
for(let i=0;i<2000;i++){
  const r=55+Math.random()*25, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(p)*Math.cos(t); sp[i*3+1]=r*Math.cos(p); sp[i*3+2]=r*Math.sin(p)*Math.sin(t);
}
sg.setAttribute('position', new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:0.14,transparent:true,opacity:0.65})));

// Earth textures
const tl = new THREE.TextureLoader();
const dayTex = tl.load('8k_earth_daymap.jpg');
const nightTex = tl.load('8k_earth_nightmap.jpg');

function isDaytime(){
  if(userLat===null) return true;
  const now=new Date();
  const d=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const dec=-23.45*Math.cos(Math.PI/180*360/365*(d+10));
  const c=-Math.tan(userLat*Math.PI/180)*Math.tan(dec*Math.PI/180);
  if(c<-1)return true; if(c>1)return false;
  const ha=Math.acos(c)*180/Math.PI;
  const utcH=now.getUTCHours()+now.getUTCMinutes()/60;
  const lh=((utcH+userLng/15)%24+24)%24;
  const sr=((12-ha/15)%24+24)%24, ss=((12+ha/15)%24+24)%24;
  return lh>=sr&&lh<=ss;
}

const earthMat = new THREE.MeshPhongMaterial({map:dayTex, shininess:10});
const earth = new THREE.Mesh(new THREE.SphereGeometry(1,64,64), earthMat);
scene.add(earth);

// Atmosphere
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.06,64,64),
  new THREE.MeshBasicMaterial({color:0x2255ff,transparent:true,opacity:0.07,side:THREE.BackSide})));

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.4); sun.position.set(5,3,5); scene.add(sun);
const fill = new THREE.DirectionalLight(0x7799ff, 0.25); fill.position.set(-5,-2,-3); scene.add(fill);

// No globe dot - removed as requested

// OrbitControls (touch drag to rotate)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 1.5;
controls.maxDistance = 8;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// Stop auto-rotate on touch
renderer.domElement.addEventListener('pointerdown', ()=>{ controls.autoRotate = false; });

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  earth.rotation.y += 0.00006;
  renderer.render(scene, camera);
}
animate();

// ── FLOATING EMOJIS ──
const floatEmojis = ['✈️','🌊','🦋','🐋','⭐','🌴','🦅','🌸','🐬','🌋','🦁','🐘','🌺','🦜','🌙'];
function spawnFloater(){
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = floatEmojis[Math.floor(Math.random()*floatEmojis.length)];
  const x = 20 + Math.random() * (innerWidth - 60);
  const y = innerHeight * 0.2 + Math.random() * (innerHeight * 0.5);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.getElementById('screen-globe').appendChild(el);
  setTimeout(()=> el.remove(), 4200);
}
setInterval(spawnFloater, 2800);
setTimeout(spawnFloater, 500);

// ── LEAFLET MAP ──
const mapEl = document.getElementById('map-el');
map = L.map(mapEl, {zoomControl:false, attributionControl:false}).setView([35.68,139.76],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
map.on('zoomend', ()=>{ if(map.getZoom()<=3) closeMap(); });

function openMap(lat, lng, title){
  document.getElementById('map-file-title').textContent = title || 'Map';
  document.getElementById('screen-map').classList.add('open');
  setTimeout(()=>{
    map.invalidateSize();
    if(lat!=null) map.setView([lat,lng], map.getZoom()<10?15:map.getZoom(), {animate:false});
  }, 120);
}
function closeMap(){
  document.getElementById('screen-map').classList.remove('open');
  controls.autoRotate = true;
}
document.getElementById('map-back').addEventListener('click', closeMap);
document.getElementById('zoom-to-map-btn').addEventListener('click', ()=>{
  if(files.length===0){ openAddFile(); return; }
  if(files.length===1){ currentFileId=files[0].id; openMap(userLat,userLng,files[0].name); return; }
  openFilePicker('map');
});

// Map loc dot
function updateMapDot(lat, lng, acc){
  if(!map) return;
  const icon = L.divIcon({className:'',html:'<div class="loc-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]});
  if(!mapDot){ mapDot = L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map); }
  else mapDot.setLatLng([lat,lng]);
  const r = Math.min(acc||50, 300);
  if(!mapAcc){ mapAcc = L.circle([lat,lng],{radius:r,color:'#4285F4',fillColor:'#4285F4',fillOpacity:0.07,weight:1}).addTo(map); }
  else{ mapAcc.setLatLng([lat,lng]); mapAcc.setRadius(r); }
}

// ── GEOLOCATION ──
function getLoc(highAccuracy=false){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation){rej(new Error('Not supported'));return;}
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
      e=>rej(e),
      {enableHighAccuracy:highAccuracy, timeout:highAccuracy?10000:5000, maximumAge:highAccuracy?0:15000}
    );
  });
}

function focusGlobe(lat,lng){
  const phi=(90-lat)*Math.PI/180, theta=(lng+180)*Math.PI/180, r=2.6;
  camera.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
  controls.target.set(0,0,0); controls.update();
}

// Start watching on load
function updateDayNight(){
  if(userLat===null) return;
  earthMat.map = isDaytime()?dayTex:nightTex;
  earthMat.needsUpdate = true;
}

if(navigator.geolocation){
  getLoc(false).then(l=>{
    userLat=l.lat; userLng=l.lng;
    updateDayNight();
  }).catch(()=>{});

  watchId = navigator.geolocation.watchPosition(p=>{
    userLat=p.coords.latitude; userLng=p.coords.longitude;
    updateMapDot(userLat,userLng,p.coords.accuracy);
    updateDayNight();
  }, null, {enableHighAccuracy:true, maximumAge:5000});
}

// Update day/night every minute
setInterval(updateDayNight, 60000);

// My loc buttons - always open map and center on location
async function goToMyLoc(){
  toast('📍 Locating...');
  try{
    const l = await getLoc(true);
    userLat=l.lat; userLng=l.lng;
    hideToast();
    updateMapDot(userLat,userLng,l.acc);
    updateDayNight();
    const mapOpen = document.getElementById('screen-map').classList.contains('open');
    if(mapOpen){
      map.setView([userLat,userLng],16,{animate:true,duration:0.5});
    } else {
      // Determine file title
      const file = files.find(f=>f.id==currentFileId);
      openMap(userLat, userLng, file?file.name:'Map');
      setTimeout(()=>map.setView([userLat,userLng],16,{animate:false}),200);
    }
  }catch(e){ toast('⚠️ Location denied. Allow location in browser settings.',3000); }
}
document.getElementById('myloc-btn').addEventListener('click', goToMyLoc);
document.getElementById('map-myloc-btn').addEventListener('click', goToMyLoc);

// ── SAVE FLOW ──
async function startSave(screen){
  pendingScreen = screen;
  toast('📍 Getting location...');
  try{
    const l = await getLoc(false);
    pendingLat=l.lat; pendingLng=l.lng;
    hideToast();
    if(!currentFileId){
      if(files.length===0){ openAddFile(); return; }
      if(files.length===1){ currentFileId=files[0].id; }
      else{ openFilePicker('save'); return; }
    }
    openSaveSheet();
  }catch(e){ toast('⚠️ Location denied',2500); }
}
document.getElementById('save-btn').addEventListener('click', ()=>startSave('globe'));
document.getElementById('map-save-btn').addEventListener('click', ()=>startSave('map'));

function openSaveSheet(){
  document.getElementById('save-sheet').classList.add('open');
  document.getElementById('place-input').value='';
  setTimeout(()=>document.getElementById('place-input').focus(), 380);
}
function closeSaveSheet(){
  document.getElementById('save-sheet').classList.remove('open');
  document.getElementById('place-input').blur();
}
document.getElementById('cancel-btn').addEventListener('click', closeSaveSheet);
document.getElementById('place-input').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('confirm-btn').click(); });

document.getElementById('confirm-btn').addEventListener('click', ()=>{
  const name = document.getElementById('place-input').value.trim();
  if(!name){ document.getElementById('place-input').focus(); return; }
  const key = `eg_places_${currentFileId}`;
  const places = JSON.parse(localStorage.getItem(key)||'[]');
  places.unshift({id:Date.now(), name, lat:pendingLat, lng:pendingLng, ts:new Date().toISOString()});
  localStorage.setItem(key, JSON.stringify(places));
  renderMenuFiles();
  renderDrawer();
  closeSaveSheet();
  toast('✅ Saved!', 2000);
});

// ── FILE PICKER ──
function openFilePicker(mode){
  const fp = document.getElementById('file-picker');
  const list = document.getElementById('fp-list');
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
  list.innerHTML = files.map((f,i)=>`
    <div class="fp-item" data-id="${f.id}" data-name="${f.name}">
      <div class="fp-icon" style="background:${colors[i%colors.length]}22;">${f.emoji||'📁'}</div>
      <div class="fp-name">${f.name}</div>
    </div>`).join('');
  list.querySelectorAll('.fp-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentFileId = el.dataset.id;
      fp.classList.remove('open');
      if(mode==='save') openSaveSheet();
      else openMap(userLat,userLng,el.dataset.name);
    });
  });
  fp.classList.add('open');
}

document.getElementById('add-file-btn2').addEventListener('click', ()=>{
  document.getElementById('file-picker').classList.remove('open');
  openAddFile();
});

// ── ADD FILE ──
function openAddFile(){
  const name = prompt('File name:');
  if(!name) return;
  const emojis = ['🌏','🗺️','✈️','🏔️','🏖️','🌆','🍜','🏕️','🎌'];
  const f = {id:Date.now().toString(), name, emoji:emojis[Math.floor(Math.random()*emojis.length)]};
  files.push(f);
  localStorage.setItem('eg_files', JSON.stringify(files));
  currentFileId = f.id;
  renderMenuFiles();
  openSaveSheet();
}

// ── SIDE MENU ──
document.getElementById('menu-btn').addEventListener('click', ()=>{
  document.getElementById('side-menu').classList.add('open');
  document.getElementById('menu-overlay').classList.add('show');
  renderMenuFiles();
});
document.getElementById('menu-overlay').addEventListener('click', closeMenu);
function closeMenu(){
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('show');
}

document.getElementById('add-file-btn').addEventListener('click', ()=>{
  closeMenu();
  const name = prompt('File name:');
  if(!name) return;
  const emojis = ['🌏','🗺️','✈️','🏔️','🏖️','🌆','🍜','🏕️','🎌'];
  const f = {id:Date.now().toString(), name, emoji:emojis[Math.floor(Math.random()*emojis.length)]};
  files.push(f);
  localStorage.setItem('eg_files', JSON.stringify(files));
  currentFileId = f.id;
  renderMenuFiles();
  openMap(userLat,userLng,f.name);
});

function renderMenuFiles(){
  const list = document.getElementById('files-list-menu');
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
  if(!files.length){
    list.innerHTML='<div style="padding:32px 20px;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.6;">No files yet.<br>Tap ＋ to create one!</div>';
    return;
  }
  list.innerHTML = files.map((f,i)=>{
    const places = JSON.parse(localStorage.getItem(`eg_places_${f.id}`)||'[]');
    return `<div class="menu-file" data-id="${f.id}" data-name="${f.name}">
      <div class="menu-file-icon" style="background:${colors[i%colors.length]}22;">${f.emoji||'📁'}</div>
      <div class="menu-file-info">
        <div class="menu-file-name">${f.name}</div>
        <div class="menu-file-count">${places.length} place${places.length!==1?'s':''}</div>
      </div>
      <button class="menu-file-del" data-id="${f.id}">Delete</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.menu-file').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('menu-file-del')) return;
      currentFileId = el.dataset.id;
      closeMenu();
      renderDrawer();
      openMap(userLat,userLng,el.dataset.name);
    });
  });
  list.querySelectorAll('.menu-file-del').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      if(!confirm('Delete this file?')) return;
      const id = btn.dataset.id;
      localStorage.removeItem(`eg_places_${id}`);
      files = files.filter(f=>f.id!==id);
      localStorage.setItem('eg_files', JSON.stringify(files));
      if(currentFileId===id) currentFileId=null;
      renderMenuFiles();
    });
  });
}
renderMenuFiles();

// ── PLACES DRAWER ──
function renderDrawer(){
  if(!currentFileId) return;
  const places = JSON.parse(localStorage.getItem(`eg_places_${currentFileId}`)||'[]');
  const dl = document.getElementById('drawer-list');
  if(!places.length){
    dl.innerHTML='<div class="drawer-empty">No saved places yet.<br>Tap the blue button to save!</div>';
    return;
  }
  dl.innerHTML = places.map(p=>{
    const d=new Date(p.ts), fmt=d.toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'});
    return `<div class="place-item" data-lat="${p.lat}" data-lng="${p.lng}" data-id="${p.id}">
      <div class="place-name">${p.name}</div>
      <div class="place-date">${fmt}</div>
      <button class="place-del" data-id="${p.id}">✕</button>
    </div>`;
  }).join('');
  dl.querySelectorAll('.place-item').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.classList.contains('place-del')) return;
      const lat=parseFloat(el.dataset.lat), lng=parseFloat(el.dataset.lng);
      closeDrawer();
      map.setView([lat,lng],16,{animate:true});
    });
  });
  dl.querySelectorAll('.place-del').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const id=parseInt(btn.dataset.id);
      const key=`eg_places_${currentFileId}`;
      let places=JSON.parse(localStorage.getItem(key)||'[]');
      places=places.filter(p=>p.id!==id);
      localStorage.setItem(key,JSON.stringify(places));
      renderDrawer(); renderMenuFiles();
    });
  });
}

document.getElementById('map-places-btn').addEventListener('click', ()=>{
  renderDrawer();
  document.getElementById('places-drawer').classList.add('open');
  document.getElementById('places-overlay').classList.add('show');
});
function closeDrawer(){
  document.getElementById('places-drawer').classList.remove('open');
  document.getElementById('places-overlay').classList.remove('show');
}
document.getElementById('close-drawer-btn').addEventListener('click', closeDrawer);
document.getElementById('places-overlay').addEventListener('click', closeDrawer);

// ── TOAST ──
let toastT=null;
function toast(msg, dur=0){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastT) clearTimeout(toastT);
  if(dur>0) toastT=setTimeout(hideToast,dur);
}
function hideToast(){ document.getElementById('toast').classList.remove('show'); }

// ── RESIZE ──
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  if(map) map.invalidateSize();
});
</script>
</body>
</html>
